// Top-level build file for Android packaging
buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.1.0'
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: 'com.android.application'

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar', '*.aar'])
    implementation 'com.github.mik3y:usb-serial-for-android:3.8.0'
}

android {
    namespace 'com.serialtool'
    compileSdk 34

    defaultConfig {
        applicationId "com.serialtool"
        minSdkVersion 21
        targetSdkVersion 34
        versionCode 1
        versionName "0.1"
    }

    sourceSets {
        main {
            manifest.srcFile 'AndroidManifest.xml'
            java.srcDirs = ['src']
            res.srcDirs = ['res']
            jniLibs.srcDirs = ['libs']
        }
    }

    // Qt provides the native library
    lintOptions {
        abortOnError false
    }
}
